<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎉 大年初五辦尾牙</title>

  <!-- 你原本的樣式 -->
  <link rel="stylesheet" href="style.css">

  <!-- ✅ 保險＋完成頁美化（不影響 JS） -->
  <style>
    body {
      margin: 0;
      background: #eef1ec;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 22px 32px;
      box-shadow: 0 10px 28px rgba(0,0,0,.08);
      animation: fadeIn .35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ✅ 完成頁標題 */
    .card h2 {
      font-size: 26px;
      margin-bottom: 8px;
    }

    /* ✅ 分數大字 */
    .card p strong {
      font-size: 32px;
      color: #5f7f6d;
    }

    /* ✅ 題目回顧清單 */
    .review {
      margin-top: 18px;
    }

    .review-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      margin: 6px 0;
    }

    /* ✅ 重新作答大按鈕 */
    .card button {
      margin-top: 26px;
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #7ea892, #5f7f6d);
      color: #fff;
      box-shadow: 0 6px 14px rgba(0,0,0,.15);
    }

    .card button:active {
      transform: scale(.98);
    }

    /* 下一題按鈕（測驗中） */
    #nextBtn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      font-size: 17px;
      border-radius: 14px;
      border: none;
      background: #8fa89a;
      color: #fff;
    }

    #nextBtn:disabled {
      background: #cfd8d1;
    }
  </style>
</head>

<body>

  <!-- ⚠️ JS 會抓這個，不能改 -->
  <div class="app">

    <div class="nav" id="nav"></div>

    <div class="card">
      <div id="progress"></div>
      <h2 id="question"></h2>
      <div id="content"></div>
      <button id="nextBtn" disabled>下一題</button>
    </div>

  </div>

  <!-- ⚠️ script.js 一定要最後 -->
  <script src="script.js"></script>
</body>
</html>
