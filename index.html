<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎉 大年初五辦尾牙</title>

  <style>
    body {
      margin: 0;
      background: #eef1ec;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .nav {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .nav button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #d6ddd7;
      color: #55635b;
    }

    .nav button.active {
      background: #7ea892;
      color: #fff;
    }

    .nav button.answered {
      border: 2px solid #7ea892;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 22px 32px;
      box-shadow: 0 10px 28px rgba(0,0,0,.08);
      animation: fadeIn .35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #progress {
      font-size: 14px;
      color: #7c8a82;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 14px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      padding: 12px 14px;
      border-radius: 14px;
      background: #f3f5f2;
    }

    .option.selected {
      background: #7ea892;
      color: #fff;
    }

    .match-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }

    select {
      padding: 6px;
      border-radius: 8px;
    }

    #nextBtn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      font-size: 17px;
      border-radius: 14px;
      border: none;
      background: #8fa89a;
      color: #fff;
    }

    #nextBtn:disabled {
      background: #cfd8d1;
    }

    /* ===== 完成頁（莫蘭迪極簡） ===== */

    .result {
      text-align: center;
    }

    .result h2 {
      font-size: 26px;
      margin-bottom: 18px;
    }

    .score {
      background: #f2f4f1;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .score span {
      display: block;
      font-size: 14px;
      color: #7c8a82;
    }

    .score strong {
      font-size: 42px;
      color: #5f7f6d;
    }

    .rank {
      font-size: 22px;
      margin-bottom: 18px;
    }

    .review {
      text-align: left;
      margin-top: 14px;
    }

    .review-item {
      background: #f7f9f7;
      border-radius: 12px;
      padding: 8px 12px;
      margin: 6px 0;
      font-size: 15px;
    }

    button.primary {
      margin-top: 18px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7ea892, #5f7f6d);
      color: #fff;
      font-size: 16px;
    }

    button.ghost {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #e6ebe7;
      color: #55635b;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="nav" id="nav"></div>

    <div class="card">
      <div id="progress"></div>
      <h2 id="question"></h2>
      <div id="content"></div>
      <button id="nextBtn" disabled>下一題</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
