<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎉 尾牙辦在開工日 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang TC", "Noto Sans TC", sans-serif;
      background: #eef2ec;
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.06);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== 完成頁美化 ===== */

    .result-card {
      text-align: center;
    }

    .result-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .result-score {
      font-size: 52px;
      font-weight: 800;
      color: #5f7f6e;
      margin-bottom: 6px;
    }

    .result-sub {
      font-size: 16px;
      color: #7a8f85;
      margin-bottom: 24px;
    }

    .result-list {
      text-align: left;
      margin-bottom: 24px;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      margin-bottom: 10px;
      background: #f4f7f4;
      border-radius: 14px;
      font-size: 15px;
    }

    .retry-btn {
      width: 100%;
      height: 58px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      background: #6f8f7d;
      color: white;
      cursor: pointer;
    }

    .retry-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card">

      <!-- ===== 測驗完成頁 ===== -->
      <div class="result-card">
        <div class="result-title">🎉 測驗完成</div>
        <div class="result-score">100 / 100</div>
        <div class="result-sub">你太強了！全數答對 💯</div>

        <div class="result-list">
          <div class="result-item">✅ 第 1 題</div>
          <div class="result-item">✅ 第 2 題</div>
          <div class="result-item">✅ 第 3 題</div>
          <div class="result-item">✅ 第 4 題</div>
          <div class="result-item">✅ 第 5 題</div>
          <div class="result-item">✅ 第 6 題</div>
          <div class="result-item">✅ 第 7 題</div>
          <div class="result-item">✅ 第 8 題</div>
          <div class="result-item">✅ 第 9 題</div>
          <div class="result-item">✅ 第 10 題</div>
        </div>

        <button class="retry-btn" onclick="location.reload()">
          🔄 重新作答
        </button>
      </div>

    </div>
  </div>
</body>
</html>
